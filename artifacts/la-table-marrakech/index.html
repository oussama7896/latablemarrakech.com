    <!-- src/lib/seo.ts (useSEO hook). The defaults below are the homepage -->

    <link rel="alternate" hreflang="x-default" href="https://latablemarrakech.com/" />

    <meta property="og:site_name" content="La Table Marrakech" />

    <meta property="og:description" content="Private chef at your villa or riad in Marrakech. Bespoke Moroccan menus, souk-fresh ingredients, full service & cleanup. From €85/person. WhatsApp +212 721 354 757." />

    <meta name="twitter:description" content="Private chef at your villa or riad in Marrakech. Bespoke Moroccan menus, souk-fresh ingredients, full service & cleanup. From €85/person. WhatsApp +212 721 354 757." />
    <meta name="twitter:image" content="https://latablemarrakech.com/opengraph.jpg" />

    <!-- Icons -->

    <!-- FoodEstablishment structured data -->
    <!-- Keep aggregateRating live only if the 4.9/200+ review claim is backed by real public reviews. -->

      "url": "https://latablemarrakech.com",

      "telephone": "+212721354757",
      "priceRange": "€€€",
      "servesCuisine": ["Moroccan", "Mediterranean"],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Marrakech",
        "addressCountry": "MA"
      },
      "areaServed": {
        "@type": "City",
        "name": "Marrakech"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "200",
        "bestRating": "5"
      }
    }
    </script>

    <!-- Resource hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.pexels.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>

    <!-- LCP hero image preload (matches Home hero <img> srcset) -->
    <link
      rel="preload"
      as="image"
      href="https://images.pexels.com/photos/29125650/pexels-photo-29125650.jpeg?auto=compress&cs=tinysrgb&w=1600&q=80"
      fetchpriority="high"
      imagesrcset="https://images.pexels.com/photos/29125650/pexels-photo-29125650.jpeg?auto=compress&cs=tinysrgb&w=800&q=70 800w, https://images.pexels.com/photos/29125650/pexels-photo-29125650.jpeg?auto=compress&cs=tinysrgb&w=1200&q=75 1200w, https://images.pexels.com/photos/29125650/pexels-photo-29125650.jpeg?auto=compress&cs=tinysrgb&w=1600&q=80 1600w"
      imagesizes="100vw"
    />

    <!-- Fonts: non-blocking -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    </noscript>

    <!-- ─────────────────────────────────────────────────────────── -->
    <!-- ANALYTICS — initialize dataLayer + gtag stubs early so any  -->
    <!-- whatsapp_click / page_view events fire and queue even if    -->
    <!-- GTM and GA4 are added later.                                -->
    <!--                                                              -->
    <!-- Tracking IDs are read at BUILD TIME from environment vars:  -->
    <!--   VITE_GTM_ID   (e.g. GTM-XXXXXXX) — optional               -->
    <!--   VITE_GA4_ID   (e.g. G-XXXXXXXXXX) — optional              -->
    <!-- Vite replaces %VITE_X% placeholders with the env value, or  -->
    <!-- leaves the literal "%VITE_X%" string if the var is unset.   -->
    <!-- The conditional checks below skip injection in that case.   -->
    <!-- ─────────────────────────────────────────────────────────── -->
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function(){ window.dataLayer.push(arguments); };
      window.gtag('js', new Date());

      (function () {
        var gtmId = '%VITE_GTM_ID%';
        var ga4Id = '%VITE_GA4_ID%';
        var hasGtm = gtmId && /^GTM-[A-Z0-9]+$/.test(gtmId);
        var hasGa4 = ga4Id && /^G-[A-Z0-9]+$/.test(ga4Id);

        // Google Tag Manager — preferred. GA4 should be configured inside
        // GTM, not also injected directly, to avoid duplicate page_views.
        if (hasGtm) {
          (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
          new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer',gtmId);
          window.__ltmGtm = gtmId;
        } else if (hasGa4) {
          // No GTM container — install GA4 directly via gtag.js.
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + ga4Id;
          document.head.appendChild(s);
          // send_page_view: false because useSEO() fires its own SPA page_view
          // on every route change. Without this we'd double-count the first
          // page_view on initial load.
          window.gtag('config', ga4Id, { send_page_view: false });
          window.__ltmGa4 = ga4Id;
        }

        // GTM noscript iframe — injected from JS so we don't emit a 404
        // request when GTM_ID is not configured.
        if (hasGtm) {
          document.addEventListener('DOMContentLoaded', function () {
            var ns = document.createElement('noscript');
            ns.innerHTML = '<iframe src="https://www.googletagmanager.com/ns.html?id=' +
              gtmId + '" height="0" width="0" style="display:none;visibility:hidden"></iframe>';
            document.body.insertBefore(ns, document.body.firstChild);
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
